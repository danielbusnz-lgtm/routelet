name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Create venv and install base deps
        run: uv sync --no-dev

      - name: Lint
        run: uvx ruff check

      - name: Unit tests
        run: uv run python -m unittest discover -s tests -v
